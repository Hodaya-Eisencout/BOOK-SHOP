<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="onInit()">

    <h1>Book Shop</h1>

    <button onclick="onAddBook()">Add Book</button>

    <div class="add-modal">
        <h3 class="modal-title-add">Add Book</h3>

        <label for="book-title">Title</label>
        <input id="book-title" type="text" placeholder="Enter title">

        <label for="book-price">Price</label>
        <input id="book-price" type="number" placeholder="Enter price">

        <button class="save-btn" onclick="onSaveBook()">Save</button>
        <button onclick="onCloseAddModal()">Close</button>
    </div>

    <label for="filter-by-title">Filter by title:</label>
    <input id="filter-by-title" type="text" placeholder="Search by title" oninput="onSetFilterBy()" />

    <label for="filter-by-rating">Min rating:</label>
    <select id="filter-by-rating" onchange="onSetFilterBy()">
        <option value="0">All</option>
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
        <option value="4">4+</option>
        <option value="5">5</option>
    </select>

    <button onclick="onClearFilter()">Clear</button>

    <label for="sort-by">Sort by:</label>
    <select id="sort-by" onchange="onSetSortBy()">
        <option value="">None</option>
        <option value="title">Title</option>
        <option value="price">Price</option>
        <option value="rating">Rating</option>
    </select>

    <label>
        <input type="radio" name="sort-dir" value="asc" onchange="onSetSortBy()" checked>
        Asc
    </label>

    <label>
        <input type="radio" name="sort-dir" value="desc" onchange="onSetSortBy()">
        Desc
    </label>

    <p class="user-msg"></p>

    <table border="1">
        <thead>
            <tr>
                <th>Cover</th>
                <th>Title</th>
                <th>Price</th>
                <th>Rating</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody class="books-container">
        </tbody>
    </table>

    <button onclick="onPrevPage()">Prev</button>
    <button onclick="onNextPage()">Next</button>

    <footer>
        <p class="stats"></p>
    </footer>

    <div class="modal">
        <h3>Book Details</h3>
        <img class="modal-book-img" src="" alt="Book cover">
        <p class="modal-title"></p>
        <p class="modal-price"></p>

        <p>Rating:</p>
        <div class="rating-container">
            <button onclick="onDecreaseRating()">-</button>
            <span class="modal-rating-value">0</span>
            <button onclick="onIncreaseRating()">+</button>
        </div>

        <button onclick="onCloseModal()">Close</button>
    </div>

    <script src="js/book.service.js"></script>
    <script src="js/book.controller.js"></script>
    
</body>

</html>
